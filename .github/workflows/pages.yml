name: Build, test, and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate research and experiment data
        run: npm run generate:data

      - name: Build production application
        run: npm run build

      - name: Generate offline and Pages artifacts
        run: npm run build:pages

      - name: Run page and data tests
        run: node --test tests/*.test.mjs

      - name: Run multi-UAV traffic avoidance regression
        run: npm run test:traffic

      - name: Verify Pages artifact
        shell: bash
        run: |
          test -f pages-dist/index.html
          test -f pages-dist/.nojekyll
          cmp -s "打开无人机可视化网站.html" pages-dist/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
